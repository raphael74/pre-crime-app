<div class="apology-card arrest-card" th:each="pair : ${pendingPreArrests}">
    <div class="apology-header">
        <span class="apology-perpetrator"
              th:text="${pair.perpetrator.firstName + ' ' + pair.perpetrator.lastName}"></span>
        <span class="arrest-status" th:text="${pair.preArrest.status}"></span>
    </div>
    <div class="apology-breakdown">
        <span>Date: <span
                th:text="${#temporals.format(pair.preArrest.preArrestIssuedDate, 'dd-MMM-yyyy HH:mm')}"></span></span>
        <span>ID: <span th:text="${pair.preArrest.id.toString().substring(0, 8) + '...'}"></span></span>
        <span>Vision: <span th:text="${pair.preArrest.visionId.toString().substring(0, 8) + '...'}"></span></span>
    </div>
    <div class="apology-breakdown">
        <span>
            <button class="pre-arrest-btn"
                    hx-swap="none"
                    th:attr="hx-post='/api/pre-crime/arrest-executed', hx-vals='{&quot;preArrestId&quot;: &quot;' + ${pair.preArrest.id} + '&quot;}'"
                    type="button">Confirm Pre-Arrest executed</button>
        </span>
        <span>
            <button class="pre-arrest-btn"
                    hx-swap="none"
                    th:attr="hx-post='/api/pre-crime/arrest-cancelled', hx-vals='{&quot;preArrestId&quot;: &quot;' + ${pair.preArrest.id} + '&quot;}'"
                    type="button">Cancel Pre-Arrest</button>
        </span>
    </div>
</div>
<div class="apologies-empty" th:if="${#lists.isEmpty(pendingPreArrests)}">No pending Pre-Arrests...</div>
