<div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="panel" style="width: 400px; padding: 40px;">
        <div class="scanner"></div>
        <div style="text-align: center; margin-bottom: 20px;">
            <img alt="fedpol logo" class="logo" src="assets/images/fedpol-logo-de.png"
                 style="height: 100px; margin-right: 0;">
        </div>
        <h1 style="text-align: center; margin-bottom: 30px;">AUTH ACCESS</h1>
        <div class="vision-form">
            <label>Division ID</label>
            <input [(ngModel)]="username" placeholder="USERNAME..." type="text">
            <label>Access Key</label>
            <input [(ngModel)]="password" placeholder="PASSWORD..." type="password">
            <button (click)="onLogin()">AUTHORIZE</button>
            <div *ngIf="error" style="color: #ff4d4d; margin-top: 10px; text-align: center; font-size: 0.8em;">
                ERROR: {{error}}
            </div>
        </div>
        <div style="margin-top: 30px; font-size: 0.7em; color: rgba(0, 242, 255, 0.5); text-align: center;">
            WARNING: UNAUTHORIZED ACCESS IS A FUTURE FELONY
        </div>
    </div>
</div>
