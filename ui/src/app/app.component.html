<div class="hud-container">
    <header class="panel"
            style="grid-column: span 3; display: flex; justify-content: space-between; align-items: center;">
        <h1>Department of Pre-Crime</h1>
        <div class="status-indicator">SYSTEM STATUS: OPTIMAL</div>
    </header>

    <aside class="panel">
        <div class="scanner"></div>
        <h2>Precog Input</h2>
        <div class="vision-form">
            <label>Target Perpetrator</label>
            <input [(ngModel)]="perpetrator" placeholder="NAME...">
            <label>Projected Crime</label>
            <input [(ngModel)]="crimeType" placeholder="CRIME TYPE...">
            <button (click)="triggerVision()">Submit to Precogs</button>
        </div>
    </aside>

    <main class="panel">
        <h2>Live Surveillance Feed</h2>
        <div class="log-feed">
            <div *ngFor="let log of logs" class="log-entry">
                [{{log.time}}] >> {{log.message}}
            </div>
        </div>
    </main>

    <aside class="panel">
        <h2>Statistics</h2>
        <div style="font-size: 3em; text-align: center; margin-top: 20px;">
            {{crimesPrevented}}
        </div>
        <div style="text-align: center;">Crimes Prevented</div>
    </aside>

    <footer class="panel" style="grid-column: span 3; font-size: 0.7em; color: rgba(0, 242, 255, 0.5);">
        CONFIDENTIAL - PROPERTY OF PRE-CRIME DIVISION - WASHINGTON D.C.
    </footer>
</div>
