name: Build and Bundle Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build Frontend
        run: |
          cd ui
          npm ci
          npm run generate-api
          npm run build
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Bundle Frontend into Backend
        run: |
          mkdir -p src/main/resources/static
          cp -r ui/dist/precrime-ui/browser/* src/main/resources/static/

      - name: Build Backend JAR and Run Tests
        run: |
          chmod +x mvnw
          ./mvnw clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pre-crime-app
          path: target/pre-crime-app.jar
          if-no-files-found: error

  e2e:
    needs: build
    uses: ./.github/workflows/playwright-e2e.yml
