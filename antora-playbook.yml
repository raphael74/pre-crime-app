antora:
  extensions:
    - require: ./etc/antora/extensions/node_modules/@sntke/antora-mermaid-extension
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs

site:
  title: Pre-Crime Application Docs
  url: https://raphael74.github.io/pre-crime-app
  start_page: developer-docs::index.adoc

content:
  sources:
    - url: ./
      branches: HEAD
      start_path: etc/antora

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

output:
  dir: ./build/site
