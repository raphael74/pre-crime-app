name: Cleanup Old Artifacts

on:
  workflow_run:
    workflows: [ "Build and Bundle Application" ]
    types:
      - completed
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all artifacts..."
          
          # List all artifacts, sorted by created_at descending
          # We skip the first one (the latest) and delete the rest
          gh api -X GET /repos/${{ github.repository }}/actions/artifacts -f per_page=100 \
            --jq '.artifacts | sort_by(.created_at) | reverse | .[1:] | .[].id' | \
            while read -r artifact_id; do
              echo "Deleting artifact ID: $artifact_id"
              gh api -X DELETE /repos/${{ github.repository }}/actions/artifacts/$artifact_id
            done
